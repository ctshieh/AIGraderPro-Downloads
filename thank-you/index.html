<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message Sent | 訊息已送出</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg,#0b3a8a,#2b6bd6 60%,#f5f8ff);
      color:#0b1020;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:80px 20px;
    }

    .card{
      background:#ffffff;
      border-radius:18px;
      padding:40px;
      box-shadow:0 20px 60px rgba(15,23,42,.18);
      text-align:center;
    }

    h1{
      margin:0 0 18px;
      font-size:28px;
      font-weight:700;
    }

    p{
      margin:10px 0;
      line-height:1.6;
      color:rgba(11,16,32,.85);
    }

    .divider{
      margin:28px 0;
      height:1px;
      background:rgba(11,16,32,.1);
    }

    .btn{
      display:inline-block;
      margin-top:18px;
      padding:12px 22px;
      border-radius:14px;
      background:#1b5cff;
      color:#fff;
      text-decoration:none;
      font-weight:600;
    }

    .btn:hover{
      opacity:.9;
    }

    .muted{
      font-size:14px;
      opacity:.6;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="card">

      <h1>Message Sent ✅</h1>

      <p>
        Thank you — we’ve received your message.<br>
        We typically respond within <strong>2 business days</strong>.
      </p>

      <div class="divider"></div>

      <h1>訊息已送出 ✅</h1>

      <p>
        感謝您的來信，我們已收到您的訊息。<br>
        通常會在 <strong>2 個工作日內</strong> 回覆您。
      </p>

      <a href="/" class="btn">Back to Home / 返回首頁</a>

      <p class="muted">
        AI Grader Pro — Professional AI Grading Tool for Educators
      </p>

    </div>
  </div>

</body>
</html>
