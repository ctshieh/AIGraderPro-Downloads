name: Notify website repo on release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to send when running manually"
        required: false
        default: "manual-test"
      published_at:
        description: "Publish timestamp to send when running manually"
        required: false
        default: "2026-04-07T00:00:00Z"

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve payload values
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISHED_AT: ${{ inputs.published_at }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "release" ]; then
            VERSION="${RELEASE_TAG}"
            PUBLISHED_AT="${RELEASE_PUBLISHED_AT}"
          else
            VERSION="${INPUT_VERSION}"
            PUBLISHED_AT="${INPUT_PUBLISHED_AT}"
          fi

          if [ -z "${VERSION:-}" ]; then
            echo "ERROR: version is missing."
            exit 1
          fi

          if [ -z "${PUBLISHED_AT:-}" ]; then
            echo "ERROR: published_at is missing."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"

          echo "Resolved version: ${VERSION}"
          echo "Resolved published_at: ${PUBLISHED_AT}"

      - name: Validate token
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: WEBSITE_REPO_PAT is missing."
            exit 1
          fi

      - name: Send repository_dispatch to website repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_PAT }}
          WEBSITE_REPO: ctshieh/aigraderpro
          VERSION: ${{ steps.vars.outputs.version }}
          PUBLISHED_AT: ${{ steps.vars.outputs.published_at }}
        run: |
          set -euo pipefail

          PAYLOAD=$(cat <<EOF
          {
            "event_type": "release_published",
            "client_payload": {
              "version": "${VERSION}",
              "published_at": "${PUBLISHED_AT}",
              "releases": "https://github.com/ctshieh/AIGraderPro-Downloads/releases",
              "mac": "https://github.com/ctshieh/AIGraderPro-Downloads/releases/latest/download/AIGraderPro-mac-arm64.dmg",
              "win": "https://github.com/ctshieh/AIGraderPro-Downloads/releases/latest/download/AIGraderPro-Windows-x64.exe"
            }
          }
          EOF
          )

          HTTP_CODE=$(curl -sS -o /tmp/dispatch_response.txt -w "%{http_code}" \
            -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${WEBSITE_REPO}/dispatches \
            -d "${PAYLOAD}")

          echo "HTTP status: ${HTTP_CODE}"
          cat /tmp/dispatch_response.txt || true

          if [ "${HTTP_CODE}" != "204" ]; then
            echo "ERROR: repository_dispatch failed."
            exit 1
          fi

          echo "repository_dispatch sent successfully."
